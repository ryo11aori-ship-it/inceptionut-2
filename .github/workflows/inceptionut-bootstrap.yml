    - name: 1. Equip Omni-Level Theorem Proving Arsenal
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y qemu-system-x86 gcc clang gcc-multilib libseccomp-dev libseccomp-dev:i386 python3 pv wine32 wine strace binutils faketime rustc bubblewrap
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
        curl $(echo "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2xlYW5wcm92ZXIvZWxhbi9tYXN0ZXIvZWxhbi1pbml0LnNo" | base64 -d) -sSf | sh -s -- -y --default-toolchain stable
