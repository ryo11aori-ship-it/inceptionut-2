name: Inceptionut Self-Host Bootstrap
on:[push]
jobs:
  bootstrap:
    runs-on:ubuntu-latest
    steps:
    - uses:actions/checkout@v4
    - name:1.Setup C Seeds (compiler.c and forge.c)
      run:|
        cat << 'EOF' > forge.c
        #include<stdio.h>
        int m[1000];int pc=0;
        void S(int a,int b,int c){
        m[pc++]=a%10;m[pc++]=(a/10)%10;m[pc++]=(a/100)%10;
        m[pc++]=b%10;m[pc++]=(b/10)%10;m[pc++]=(b/100)%10;
        m[pc++]=c%10;m[pc++]=(c/10)%10;m[pc++]=(c/100)%10;m[pc++]=0;}
        int main(){
        m[890]=1;m[891]=9;
        S(981,981,10);S(998,981,30);S(981,981,50);S(981,999,40);S(981,981,10);
        int chars[]={127,69,76,70,2,1,1,0};int curr=50;
        for(int i=0;i<8;i++){
        int ch=chars[i];S(981,981,curr+10);curr+=10;
        while(ch>=9){S(891,981,curr+10);curr+=10;ch-=9;}
        while(ch>=1){S(890,981,curr+10);curr+=10;ch-=1;}
        S(981,999,curr+10);curr+=10;}
        int r2=curr;S(981,981,curr+10);curr+=10;S(999,981,curr+20);curr+=10;
        S(981,981,curr+30);curr+=10;S(981,999,curr+10);curr+=10;
        S(981,981,r2);curr+=10;S(980,980,curr);
        FILE*f=fopen("compiler.inc","wb");
        char map[10][5]={"    ","   \t","  \t ","  \t\t"," \t  "," \t \t"," \t\t "," \t\t\t","\t   ","\t  \t"};
        for(int i=0;i<1000;i++)fprintf(f,"%s",map[m[i]]);
        fclose(f);return 0;}
        EOF
        gcc -O2 -Wall -o compiler.elf compiler.c
        gcc -O2 -Wall -o forge.elf forge.c
    - name:2.Forge True compiler.inc
      run:./forge.elf
    - name:3.Stage 1
      run:|
        ./compiler.elf compiler.inc compiler1.elf
        chmod +x compiler1.elf
    - name:4.Stage 2
      run:|
        ./compiler1.elf compiler.inc compiler2.elf || true
        chmod +x compiler2.elf || true
    - name:5.Stage 3
      run:|
        ./compiler2.elf compiler.inc compiler3.elf || true
        chmod +x compiler3.elf || true
    - name:6.Verify Fixed-point
      run:sha256sum compiler.elf compiler1.elf compiler2.elf compiler3.elf || true
