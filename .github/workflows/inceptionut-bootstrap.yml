        E(0x31);E(0xc0);E(0x31);E(0xff);
        E(0x48);E(0x8d);E(0x74);E(0x24);E(0x08);
        E(0xba);E4(1);E(0x0f);E(0x05);
        E(0x48);E(0x83);E(0xf8);E(0x01);
        int je_read_ok=put_jmp(0x0f,0x84);
        E(0x41);E(0xba);E4(-1);
        int jmp_after_in=put_jmp(0xe9,0);
        patch_jmp(je_read_ok,x_len);
        E(0x44);E(0x0f);E(0xb6);E(0x54);E(0x24);E(0x08);
