    - name: 3. THEOREM 1 - Machine-Checked Subleq Semantics
      run: |
        echo "=== THEOREM 1 - Formalization of Inceptionut OISC ==="
        cat << 'EOF' > Subleq.lean
        namespace Inceptionut

        structure State where
          pc: Int
          mem: Int → Int
          halted: Bool

        def step (s: State) : State :=
          if s.halted then s
          else
            let a := s.mem s.pc
            let b := s.mem (s.pc + 1)
            let c := s.mem (s.pc + 2)
            if a == 9999 ∨ b == 9999 then
               -- I/O ports ignored in pure semantic proof for simplicity
               { s with pc := s.pc + 3 }
            else
               let valA := s.mem a
               let valB := s.mem b
               let res := valB - valA
               let newMem := fun x => if x == b then res else s.mem x
               if res ≤ 0 then
                 { s with mem := newMem, pc := c }
               else
                 { s with mem := newMem, pc := s.pc + 3 }

        -- 🌟 THE ABSOLUTE SUBLEQ INVARIANCE THEOREM 🌟
        theorem subleq_updates_correctly (s : State) (a b c : Int) (valA valB : Int) :
          s.halted = false →
          s.mem s.pc = a → s.mem (s.pc + 1) = b → s.mem (s.pc + 2) = c →
          a ≠ 9999 → b ≠ 9999 →
          s.mem a = valA → s.mem b = valB →
          (step s).mem b = valB - valA := by
          intros h_halt h_a h_b h_c h_nota h_notb h_va h_vb
          unfold step
          simp [h_halt, h_a, h_b, h_c, h_nota, h_notb, h_va, h_vb]
          split
          · simp
          · simp

        end Inceptionut
        EOF
        $HOME/.elan/bin/lean Subleq.lean
        echo "✅ Lean checked the formally verified Subleq invariant."

