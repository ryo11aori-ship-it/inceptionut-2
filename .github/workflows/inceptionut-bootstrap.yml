    - name: 10. Strict Dual-Oracle Semantic Fuzzing
      run: |
        cat << 'EOF' > fuzzer.py
        import random, subprocess, sys, os
        def py_subleq(dna_str):
            mem = [0]*20000
            bit = 0
            for ch in dna_str:
                if ch == ' ': bit += 1
                elif ch == '\t':
                    idx = (bit // 32) % 20000
                    mem[idx] |= (1 << (31 - (bit % 32)))
                    bit += 1
            for i in range(20000):
                if mem[i] >= 0x80000000: mem[i] -= 0x100000000
            pc = 0
            out = bytearray()
            steps = 0
            while pc >= 0 and pc < 19997 and steps < 10000:
                steps += 1
                a = mem[pc]; b = mem[pc+1]; c = mem[pc+2]
                if c == 9999: break  # CRITICAL: Halt condition was missing here!
                if a == 9999 or b == 9999:
                    if b == 9998: out.append((-mem[a]) & 0xFF)
                    pc += 3
                    continue
                mem[b] = mem[b] - mem[a]
                if mem[b] <= 0: pc = c
                else: pc += 3
                if len(out) > 50: break
            return out
        
        def gen_fuzz():
            m = [0]*20000
            # Random memory initialization
            for i in range(8000, 8010): m[i] = random.randint(-100, 100)
            pc = 0
            for _ in range(20): # Random instructions
                op = random.choice(["ADD", "JMP", "PRINT"])
                if op == "ADD":
                    m[pc] = random.randint(8000, 8009); m[pc+1] = random.randint(8000, 8009); m[pc+2] = pc + 3
                elif op == "JMP":
                    m[pc] = random.randint(8000, 8009); m[pc+1] = random.randint(8000, 8009); m[pc+2] = pc + random.choice([3, 6, 9]) # Forward jump only
                elif op == "PRINT":
                    m[pc] = random.randint(8000, 8009); m[pc+1] = 9998; m[pc+2] = pc + 3
                pc += 3
            m[pc] = 0; m[pc+1] = 0; m[pc+2] = 9999 # Halt
            dna = ""
            for i in range(pc + 3):
                for b in range(31, -1, -1):
                    if (m[i] >> b) & 1: dna += "\t"
                    else: dna += " "
            return dna

        for i in range(10):
            dna = gen_fuzz()
            open("fuzz.inc", "w").write(dna)
            po = py_subleq(dna)
            cr = subprocess.run(["./compiler_final.elf"], stdin=open("fuzz.inc","r"), stdout=open("fuzz.elf","wb"))
            if cr.returncode != 0:
                print(f"❌ COMPILATION CRASH {i}")
                sys.exit(1)
            os.chmod("fuzz.elf", 0o755)
            try:
                er = subprocess.run(["./fuzz.elf"], capture_output=True, timeout=2)
            except subprocess.TimeoutExpired:
                print(f"❌ EXECUTION TIMEOUT {i}")
                sys.exit(1)
            if er.stdout != po:
                print(f"❌ MISMATCH {i}\nPy: {po.hex()}\nC:  {er.stdout.hex()}")
                sys.exit(1)
        print("✅ Strict Dual-Oracle Semantic Fuzzer: Python Oracle vs Native ELF Matches Confirmed.")
        EOF
        python3 fuzzer.py

